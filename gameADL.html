<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game BADL - SMART Nurse</title>

        <link href="assets/img/พยาบาลศาสตร์.png" rel="icon">
        <link href="assets/img/พยาบาลศาสตร์.png" rel="apple-touch-icon">

        <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap" rel="stylesheet">
        <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
        <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

        <style>
        :root {
            --bg-yellow: #FFFAE4;
            --btn-orange: #F37321;
            --line-red: #A64444;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-yellow); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            margin: 0; 
            padding: 20px 0; 
        }

        .game-layout { 
            border: 4px solid #000; 
            background-color: var(--bg-yellow); 
            padding: 50px; 
            min-height: 85vh; 
            width: 100%; 
            border-radius: 15px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-subtitle { font-size: 1.3rem; font-weight: 500; }
        .game-main-title { font-size: 8.5rem; font-weight: 900; line-height: 0.9; cursor: pointer; transition: 0.3s; word-wrap: break-word; }
        .game-main-title:hover { color: var(--btn-orange); transform: scale(1.02); }

        /* วงกลม 3 วงด้านล่าง */
        .steps-container { display: flex; align-items: center; margin-top: 60px; flex-wrap: nowrap; }
        .step-circle { 
            width: 140px; height: 140px; 
            background-color: #fff; border: 4px solid #000; border-radius: 50%; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        .step-circle img { width: 100%; height: 100%; object-fit: cover; }
        .step-line { width: 120px; height: 6px; background-color: var(--line-red); margin: 0 -5px; flex-shrink: 1; min-width: 20px; }

        .big-circle-container { display: flex; justify-content: center; align-items: center; height: 100%; margin-top: 20px; }
        .big-circle { width: 380px; height: 380px; background-color: #FCE686; border-radius: 50%; border: 3px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .btn-next-step { 
            background-color: var(--btn-orange); color: #fff; border: 3px solid #000; border-radius: 50px; 
            padding: 12px 70px; font-size: 2.2rem; font-weight: 900; box-shadow: 6px 6px 0px #000; transition: 0.2s; 
            align-self: flex-end; margin-top: 40px; 
        }
        .btn-next-step:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; opacity: 0.5; }

        /* Modal Styles */
        .modal-content { border: 6px solid #000; border-radius: 25px; overflow: hidden; }
        .modal-header { background-color: #FFC107; border-bottom: 4px solid #000; }
        #close-game-btn { display: none; }
        .verify-box { background: #fff3cd; border: 2px dashed #856404; padding: 15px; border-radius: 10px; margin-top: 10px; }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 991px) {
            .game-main-title { font-size: 5rem; }
            .big-circle { width: 300px; height: 300px; }
            .step-circle { width: 100px; height: 100px; }
            .step-line { width: 80px; }
            .game-layout { padding: 30px; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .game-layout { padding: 20px; }
            .game-subtitle { font-size: 1.1rem; text-align: center; }
            .game-main-title { font-size: 4rem; text-align: center; }
            
            .steps-container { margin-top: 30px; justify-content: center; }
            .step-circle { width: 75px; height: 75px; border-width: 3px; }
            .step-line { width: 40px; height: 4px; }
            
            .big-circle-container { margin-top: 40px; }
            .big-circle { width: 220px; height: 220px; }
            
            .btn-next-step { width: 100%; text-align: center; align-self: center; font-size: 1.5rem; padding: 15px 0; margin-top: 30px; }
            
            #game-frame { height: 400px !important; }
            .modal-title { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .game-main-title { font-size: 3.2rem; }
            .step-circle { width: 60px; height: 60px; }
            .step-line { width: 25px; }
            .big-circle { width: 180px; height: 180px; }
        }
        </style>
    </head>
    <body>

        <main class="container">
            <article class="game-layout shadow-lg">
                <div class="row align-items-center">

                    <div class="col-lg-7">
                        <p class="game-subtitle">แบบประเมินความสามารถเชิงปฏิบัติในการ<br>ทำกิจวัตรประจำวันพื้นฐาน</p>
                        <h1 class="game-main-title" onclick="openGame()">Games<br>BADL</h1>

                        <div class="steps-container">
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/1. อุปกรณ์ล้างหน้า.jpg" alt="Step 1">
                            </div>
                            <div class="step-line"></div>
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/2. walker.jpg" alt="Step 2">
                            </div>
                            <div class="step-line"></div>
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/3. เซ็ตเสื้อผ้า.jpg" alt="Step 3">
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="big-circle-container">
                            <div class="big-circle shadow-lg">
                                <img src="assets/img/สีเหลืองใหญ่.png" alt="Nurse" style="max-width: 80%;">
                            </div>
                        </div>
                    </div>

                </div>

                <button id="btn-next" class="btn btn-next-step" onclick="location.href='gameIADL.html'" disabled>Next</button>
            </article>
        </main>

        <div class="modal fade" id="gameModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title fw-bold">🎮 กิจกรรม Games BADL (ต้องเล่นให้จบเพื่อปลดล็อก)</h4>
                        <button type="button" id="close-game-btn" class="btn-close" onclick="finishGame()"></button>
                    </div>
                    <div class="modal-body p-0 text-center">
                        
                        <iframe id="game-frame" style="width:100%; height: 600px;" 
                                src="https://wordwall.net/embed/80c2a11422c6407f84b08393c8c1bba7?themeId=65&templateId=5&fontStackId=21" 
                                frameborder="0" allowfullscreen>
                        </iframe>

                        <div class="p-3 bg-light border-top border-4 border-dark">
                            <div class="verify-box d-inline-block text-start">
                                <p class="mb-2 fw-bold text-danger"><i class="bi bi-exclamation-triangle-fill"></i> ยืนยันสถานะการเล่น:</p>
                                <div class="form-check">
                                    <input class="form-check-input border-dark" type="checkbox" id="check-played" onchange="checkStatus()">
                                    <label class="form-check-label" for="check-played">ฉันได้เล่นเกมจนจบและทราบผลคะแนนแล้ว</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input border-dark" type="checkbox" id="check-done" onchange="checkStatus()">
                                    <label class="form-check-label" for="check-done">ฉันพร้อมที่จะทำแบบทดสอบหลังเรียน (Post-test)</label>
                                </div>
                            </div>
                            <div id="unlock-msg" class="mt-2 fw-bold text-secondary">กรุณาเล่นเกมและติ๊กยืนยันเพื่อปิดหน้าต่างนี้</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <script>
        let gameModal = new bootstrap.Modal(document.getElementById('gameModal'));

        function openGame() {
            // ไม่ต้องใส่ .src ด้วย JS แล้ว ปล่อยให้มันโหลดจาก HTML มาเลย
            document.getElementById('check-played').checked = false;
            document.getElementById('check-done').checked = false;
            document.getElementById('close-game-btn').style.display = 'none';
            gameModal.show();
        }

        function checkStatus() {
            const p1 = document.getElementById('check-played').checked;
            const p2 = document.getElementById('check-done').checked;
            const closeBtn = document.getElementById('close-game-btn');
            const msg = document.getElementById('unlock-msg');

            if (p1 && p2) {
                closeBtn.style.display = 'block'; 
                msg.innerHTML = "<span class='text-success'>✅ ปลดล็อกแล้ว! กดปุ่ม X มุมขวาบนเพื่อดำเนินการต่อ</span>";
            } else {
                closeBtn.style.display = 'none';
                msg.innerHTML = "กรุณาเล่นเกมและติ๊กยืนยันเพื่อปิดหน้าต่างนี้";
            }
        }

        function finishGame() {
            document.getElementById('btn-next').disabled = false;
            gameModal.hide();
        }

        window.onbeforeunload = function() {
            if (document.getElementById('gameModal').classList.contains('show')) {
                return "คุณยังทำกิจกรรมไม่เสร็จสิ้น!";
            }
        };
        </script>
    </body>
</html>

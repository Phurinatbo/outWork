<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบก่อนเรียน (Pre-test) - SMART Nurse</title>
    <meta name="description" content="แบบทดสอบก่อนเรียนสำหรับการประเมินสุขภาวะผู้สูงอายุ">

    <link href="assets/img/พยาบาลศาสตร์.png" rel="icon">
    <link href="assets/img/พยาบาลศาสตร์.png" rel="apple-touch-icon">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/vendor/aos/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-navy: #1f3b5c;
            --accent-orange: #E66A19;
            --bg-cream: #FCEFB4;
            --true-green: #28a745;
            --false-red: #dc3545;
            --back-gray: #6c757d;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-cream);
            color: var(--primary-navy);
            overflow-x: hidden;
        }

        /* Auto-hide Navbar Effect */
        #header {
            transition: all 0.4s ease-in-out;
            background: rgba(255, 255, 255, 0.98);
        }

        .header-hidden { transform: translateY(-100%); }

        /* Main Quiz Layout */
        .quiz-article {
            border: 4px solid #000;
            background-color: var(--bg-cream);
            margin-top: 130px;
            margin-bottom: 50px;
            padding: 40px;
            min-height: 70vh;
            position: relative;
        }

        /* Question Styling */
        .question-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 35px;
        }

        .question-wrapper h2 {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.6;
        }

        /* Big Buttons: True/False */
        .btn-game-tf {
            font-size: 2.2rem;
            font-weight: 700;
            padding: 25px;
            border: 4px solid transparent;
            border-radius: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
        }

        .btn-true-game { background-color: var(--true-green); }
        .btn-false-game { background-color: var(--false-red); }

        .btn-game-tf:hover { transform: scale(1.05); color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .btn-game-tf.active-selection { border-color: #000; transform: scale(1.02); }

        /* --- Buttons Styles --- */
        .btn-game-tf {
            font-size: 2.2rem;
            font-weight: 700;
            padding: 20px;
            border: 4px solid transparent;
            border-radius: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            width: 100%;
        }

        /* ล็อกสีพื้นหลังให้ทึบเสมอ ป้องกัน Bootstrap ทับสีตอนกด (Focus/Active) */
        .btn-true-game, .btn-true-game:focus, .btn-true-game:active { 
            background-color: var(--true-green) !important; 
            color: #fff !important; 
            opacity: 1 !important;
        }
        .btn-false-game, .btn-false-game:focus, .btn-false-game:active { 
            background-color: var(--false-red) !important; 
            color: #fff !important; 
            opacity: 1 !important;
        }

        /* เอฟเฟกต์ตอนเอาเมาส์ชี้ (Hover) */
        .btn-game-tf:hover:not(:disabled) { 
            transform: translateY(-3px); 
            color: #fff !important; 
            box-shadow: 0 9px 0px rgba(0,0,0,0.15); 
            filter: brightness(1.1); 
            opacity: 1 !important;
        }
        
        /* เอฟเฟกต์ตอนกดเลือก (Onclick) */
        .btn-game-tf.active-selection { 
            border-color: #000 !important; 
            transform: translateY(4px) !important; 
            box-shadow: 0 2px 0px rgba(0,0,0,0.2) !important; 
            filter: brightness(0.85) !important; /* ใช้การดรอปความสว่างลงนิดนึงให้ดูเหมือนถูกกด แทนการทำโปร่งแสง */
            opacity: 1 !important;
        }

        /* Choice Buttons: MCQ */
        .btn-mcq-game {
            background: #fff;
            border: 3px solid var(--primary-navy);
            text-align: left;
            padding: 18px 30px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-radius: 12px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-mcq-game:hover, .btn-mcq-game.active-selection {
            background: var(--primary-navy) !important;
            color: #fff !important;
            border-color: #000;
            box-shadow: 6px 6px 0px #000;
        }

        /* Mascot & Action Buttons */
        .mascot-aside {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .mascot-frame {
            width: 160px;
            height: 160px;
            background: #fff;
            border: 3px solid #000;
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* กลุ่มปุ่มกด ย้อนกลับ และ ไปข้างหน้า */
        .action-buttons-group {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
        }

        .btn-action-game {
            color: #fff;
            border: 3px solid #000;
            border-radius: 50px;
            padding: 12px 0;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
            flex-grow: 1; /* ให้ปุ่มแบ่งขนาดกันเท่าๆ กัน */
            text-align: center;
        }

        .btn-next { background-color: var(--accent-orange); }
        .btn-back { background-color: var(--back-gray); }

        .btn-action-game:disabled { background: #d1d5db; border-color: #9ca3af; box-shadow: none; cursor: not-allowed; opacity: 0.7; color: #666; }
        .btn-action-game:hover:not(:disabled) { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; color: #fff; }

        /* กลุ่มปุ่มกด ย้อนกลับ และ ไปข้างหน้า */
        .action-buttons-group {
            display: flex;
            gap: 15px;
            width: 100%;
            align-items: center;
            justify-content: space-between;
        }

        /* ล้างสไตล์พื้นฐานออก เพื่อแยกแต่ง Back กับ Next ให้ต่างกัน */
        .btn-action-game {
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* ระยะห่างระหว่างไอคอนกับตัวหนังสือ */
        }

        /* ── ปุ่ม Back (ปรับให้เป็นข้อความโปร่งใส ไม่มีกรอบ ตามรูป) ── */
        .btn-back {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: var(--primary-navy) !important;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px;
        }
        .btn-back:hover:not(:disabled) {
            transform: translateX(-5px); /* ขยับไปทางซ้ายนิดนึงตอนเอาเมาส์ชี้ */
            color: var(--accent-orange) !important;
        }

        /* ── ปุ่ม Next (ปรับให้เป็นปุ่มสีส้ม มีกรอบดำและเงา ตามรูป) ── */
        .btn-next {
            background-color: var(--accent-orange) !important;
            color: #fff !important;
            border: 3px solid #000 !important;
            border-radius: 50px;
            padding: 10px 40px;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 4px 4px 0px #000 !important;
        }
        .btn-next:hover:not(:disabled) {
            transform: translate(2px, 2px); /* ขยับปุ่มลงตามเงา */
            box-shadow: 2px 2px 0px #000 !important;
        }

        /* ── สถานะตอนปุ่มถูกปิดการใช้งาน (Disabled) ── */
        .btn-back:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            color: #666 !important;
            transform: none;
        }
        .btn-next:disabled {
            background-color: #e2e8f0 !important;
            border-color: #cbd5e0 !important;
            color: #a0aec0 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Bar Customization */
        .progress { background-color: rgba(0,0,0,0.05); border-radius: 50px; border: 1px solid #000; }

        /* =========================================
           RESPONSIVE (ปรับให้พอดีกับมือถือ)
           ========================================= */
        @media (max-width: 991px) {
            .quiz-article { margin-top: 100px; padding: 30px; }
            .question-wrapper { min-height: 200px; padding: 30px; }
            .mascot-aside { margin-top: 30px; }
        }

        @media (max-width: 768px) {
            .quiz-article { margin-top: 90px; padding: 20px; min-height: auto; }
            
            #idx-view { font-size: 1rem !important; padding: 8px 16px !important; }
            .progress { height: 10px !important; }
            .mx-4 { margin-left: 1rem !important; margin-right: 1rem !important; } 

            .question-wrapper { min-height: 150px; padding: 20px; margin-bottom: 25px; }
            .question-wrapper h2 { font-size: 1.4rem; }

            .btn-game-tf { font-size: 1.5rem; padding: 15px; }
            .btn-mcq-game { font-size: 1rem; padding: 12px 20px; margin-bottom: 10px; }

            .mascot-frame { width: 120px; height: 120px; margin-bottom: 15px; }
            
            .btn-action-game { font-size: 1.2rem; padding: 10px 0; }
            
            .display-1 { font-size: 4rem; }
        }

        @media (max-width: 480px) {
            .question-wrapper h2 { font-size: 1.2rem; }
            .btn-game-tf { font-size: 1.3rem; padding: 12px; }
            .action-buttons-group { gap: 5px; }
        }
    </style>
</head>

<body>

    <header id="header" class="header d-flex align-items-center fixed-top shadow-sm">
        <div class="container-fluid container-xl d-flex align-items-center justify-content-between">
            <a href="index.html" class="logo d-flex align-items-center">
                <img src="assets/img/สกรีนช็อต 2026-01-30 203747-Photoroom.png" alt="โลโก้พยาบาลศาสตร์" style="max-height: 50px;">
            </a>
            <nav id="navmenu" class="navmenu">
                <ul class="d-flex list-unstyled m-0">
                    <li class="me-4"><a href="index.html" class="text-decoration-none">หน้าหลัก</a></li>
                    <li><a href="#" class="active text-decoration-none fw-bold">แบบทดสอบก่อนเรียน</a></li>
                </ul>

    <main class="container">
        <article class="quiz-article shadow-lg rounded-4" data-aos="zoom-in">

            <div id="quiz-flow">
                <div class="row">
                    <section class="col-lg-9">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="badge bg-dark fs-5 px-4 py-2 rounded-pill" id="idx-view">ข้อที่ 1 / 5</span>
                            <div class="progress flex-grow-1 mx-4" style="height: 15px;" role="progressbar" aria-label="สถานะการทำข้อสอบ" id="progress-container">
                                <div id="bar-view" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 20%"></div>
                            </div>
                        </div>

                        <div class="question-wrapper" data-aos="fade-up">
                            <h2 id="txt-view">เตรียมความพร้อม...</h2>
                        </div>

                        <div id="ui-area">
                            <div id="tf-grid" class="row g-4 mb-4">
                                <div class="col-6">
                                    <button type="button" class="btn btn-game-tf btn-true-game w-100" id="tf-opt0" onclick="choose(0, this)">ถูก</button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-game-tf btn-false-game w-100" id="tf-opt1" onclick="choose(1, this)">ผิด</button>
                                </div>

                            <div id="mcq-grid" class="d-none">
                                <div class="row g-3">
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt0" onclick="choose(0, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt1" onclick="choose(1, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt2" onclick="choose(2, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt3" onclick="choose(3, this)"></button></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <aside class="col-lg-3 mascot-aside" data-aos="fade-left">
                        <div class="mascot-frame">
                            <img src="assets/img/ไอคอน MMSE .PNG" alt="Mascot พยาบาล" class="img-fluid" id="mascot-img">
                        </div>
                        
                        <div class="action-buttons-group">
                            <button type="button" id="back-action" class="btn btn-action-game btn-back" onclick="stepBack()" disabled>
                                <i class="bi bi-caret-left-fill"></i> Back
                            </button>
                            <button type="button" id="next-action" class="btn btn-action-game btn-next" onclick="stepNext()" disabled>
                                Next <i class="bi bi-caret-right-fill"></i>
                            </button>
                        </div>

                    </aside>
                </div>
            </div>

            <div id="result-flow" class="d-none py-5 text-center">
                <div class="bg-white p-4 p-md-5 rounded-4 border border-5 border-navy mx-auto" style="max-width: 600px;">
                    <h2 class="fw-bold mb-4 fs-3">สรุปผลการทดสอบก่อนเรียน</h2>
                    <div class="display-1 fw-bold text-success mb-2" id="score-view">0/5</div>
                    <p class="fs-5 text-muted mb-5">คะแนนความรู้พื้นฐานของคุณ</p>
                    <a href="mmse_game.html" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold w-100">เข้าสู่หน้าถัดไป</a>
                </div>
            </div>

        </article>

    <footer class="text-center py-4">
        <p class="text-muted small m-0">© 2026 SMART Nurse - คณะพยาบาลศาสตร์ มหาวิทยาลัยขอนแก่น</p>
    </footer>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/aos/aos.js"></script>

    <script>
        const quizData = [
            { "q": "ข้อที่ 1 จากสถานการณ์ต่อไปนี้นักศึกษาพยาบาลบอกกับผู้สูงอายุว่า “นักศึกษาจะให้คุณยายคิดเลขในใจนะคะ โดยเอา 100 ตั้ง ลบออกทีละ 7 ต่อเนื่อง 5 ครั้ง ”ผู้สูงอายุตอบว่า  “93, 85, 78, 71, 64” จากผลการตอบคำถามดังกล่าว ผู้สูงอายุรายนี้จะได้รับคะแนนจำนวน 3 คะแนน", "type": "tf", "opts": ["ถูก", "ผิด"], "ans": 1 },
            { "q": "ข้อที่ 2 ผู้สูงอายุที่ไม่สามารถอ่านออกเขียนได้ ไม่มีความจำเป็นต้องทำแบบทดสอบในข้อที่ 4 ของแบบประเมิน MMSE", "type": "tf", "opts": ["ถูก", "ผิด"], "ans": 0 },
            { "q": "ข้อที่ 3 ในกรณีที่ผู้ถูกประเมินตอบคำถามไม่ถูกต้อง ผู้ประเมินควรให้คำใบ้แก่ผู้ถูกประเมินในทุกข้อคำถาม เพื่อให้สามารถตอบคำถามและได้รับคะแนนตามความเป็นจริง ", "type":"tf", "opts": ["ถูก", "ผิด"], "ans": 1 },
            { "q": "ข้อที่ 4 หากผลการประเมินด้วยแบบทดสอบ MMSE ได้คะแนนต่ำ สามารถสรุปได้ทันทีว่าผู้ถูกประเมินมีภาวะสมองเสื่อม ", "type":"tf", "opts": ["ถูก", "ผิด"], "ans": 1 },
            { "q": "ข้อที่ 5 คะแนนจุดตัด (Cut-off point) ของผู้สูงอายุที่มีสภาพปกติและไม่ได้รับการศึกษา (ไม่สามารถอ่านออกเขียนได้) คือ มากกว่าหรือเท่ากับ 14 คะแนน ", "type":"tf", "opts": ["ถูก", "ผิด"], "ans": 1 }
        ];

        let curIdx = 0;
        let userAnswers = new Array(quizData.length).fill(null); // อาเรย์สำหรับเก็บคำตอบของผู้ใช้
        let timeoutId = null;

        function render() {
            const data = quizData[curIdx];
            
            // ตั้งค่าปุ่ม กลับ (ถ้าอยู่ข้อ 1 ให้ปิดปุ่ม)
            document.getElementById('back-action').disabled = (curIdx === 0);
            
            // ตรวจสอบว่าข้อนี้เคยตอบไปแล้วหรือยัง เพื่อตั้งค่าปุ่มต่อไป
            document.getElementById('next-action').disabled = (userAnswers[curIdx] === null);

            document.getElementById('idx-view').innerText = `ข้อที่ ${curIdx + 1} / ${quizData.length}`;
            document.getElementById('txt-view').innerText = data.q;
            document.getElementById('bar-view').style.width = `${((curIdx + 1) / quizData.length) * 100}%`;

            // ล้างสไตล์การถูกเลือก (Active) ของปุ่มทั้งหมดก่อน
            document.querySelectorAll('.btn-game-tf, .btn-mcq-game').forEach(b => b.classList.remove('active-selection'));

            if (data.type === 'tf') {
                document.getElementById('tf-grid').classList.remove('d-none');
                document.getElementById('mcq-grid').classList.add('d-none');
                
                // ถ้าเคยตอบข้อนี้แล้ว ให้แสดงสถานะที่เคยเลือก
                if(userAnswers[curIdx] !== null) {
                    document.getElementById(`tf-opt${userAnswers[curIdx]}`).classList.add('active-selection');
                }

            } else {
                document.getElementById('tf-grid').classList.add('d-none');
                document.getElementById('mcq-grid').classList.remove('d-none');
                data.opts.forEach((v, i) => {
                    let btn = document.getElementById(`opt${i}`);
                    btn.innerText = v;
                    // ถ้าเคยตอบข้อนี้แล้ว ให้แสดงสถานะที่เคยเลือก
                    if(userAnswers[curIdx] === i) {
                        btn.classList.add('active-selection');
                    }
                });
            }
        }

        // ฟังก์ชันเมื่อผู้ใช้กดเลือกคำตอบ
        function choose(val, btn) {
            // เคลียร์การนับถอยหลังที่อาจจะค้างอยู่จากการกดรัวๆ
            if(timeoutId) clearTimeout(timeoutId);

            // บันทึกคำตอบ
            userAnswers[curIdx] = val;

            // เอาคลาส active ออกจากปุ่มอื่นๆ ในกลุ่มเดียวกัน
            const parent = btn.closest('.row') || btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.classList.remove('active-selection'));
            
            // ใส่คลาส active ให้ปุ่มที่ถูกกด
            btn.classList.add('active-selection');
            document.getElementById('next-action').disabled = false;

            // หน่วงเวลา 0.5 วินาที (500ms) ให้ผู้ใช้เห็นว่ากดติดแล้ว ค่อยเปลี่ยนหน้า
            timeoutId = setTimeout(() => {
                stepNext();
            }, 500); 
        }

        // ฟังก์ชันไปหน้าถัดไป
        function stepNext() {
            if(timeoutId) clearTimeout(timeoutId); // ป้องกันบัคกด Next ซ้ำตอนกำลังหน่วงเวลา
            
            curIdx++;
            if (curIdx < quizData.length) {
                render();
            } else {
                calculateAndShowResult();
            }
        }

        // ฟังก์ชันย้อนกลับ
        function stepBack() {
            if(timeoutId) clearTimeout(timeoutId);
            
            if(curIdx > 0) {
                curIdx--;
                render();
            }
        }

        // คำนวณคะแนนตอนสุดท้าย
        function calculateAndShowResult() {
            let totalScore = 0;
            for(let i = 0; i < quizData.length; i++) {
                if(userAnswers[i] === quizData[i].ans) {
                    totalScore++;
                }
            }

            document.getElementById('quiz-flow').classList.add('d-none');
            document.getElementById('result-flow').classList.remove('d-none');
            document.getElementById('score-view').innerText = `${totalScore}/${quizData.length}`;
        }

        // Auto-hide Navbar logic
        const header = document.getElementById('header');
        window.onscroll = () => {
            if (window.scrollY > 80) header.classList.add('header-hidden');
            else header.classList.remove('header-hidden');
        };
        document.onmousemove = (e) => { if (e.clientY < 60) header.classList.remove('header-hidden'); };

        document.addEventListener('DOMContentLoaded', () => { AOS.init(); render(); });
    </script>
</body>

</html>

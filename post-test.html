<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบหลังเรียน (Post-test) - SMART Nurse</title>
    <meta name="description" content="แบบทดสอบหลังเรียนพร้อมเฉลย สำหรับการประเมินสุขภาวะผู้สูงอายุ">

    <link href="assets/img/พยาบาลศาสตร์.png" rel="icon">
    <link href="assets/img/พยาบาลศาสตร์.png" rel="apple-touch-icon">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/vendor/aos/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-navy: #1f3b5c;
            --accent-orange: #E66A19;
            --bg-cream: #FCEFB4;
            --true-green: #28a745;
            --false-red: #dc3545;
            --back-gray: #6c757d;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-cream);
            color: var(--primary-navy);
            overflow-x: hidden;
        }

        #header {
            transition: all 0.4s ease-in-out;
            background: rgba(255, 255, 255, 0.98);
        }
        .header-hidden { transform: translateY(-100%); }

        .quiz-article {
            border: 4px solid #000;
            background-color: var(--bg-cream);
            margin-top: 130px;
            margin-bottom: 50px;
            padding: 40px;
            min-height: 70vh;
            position: relative;
            border-radius: 20px;
        }

        .question-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 0px rgba(0,0,0,0.1);
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid #eee;
        }

        .question-wrapper h2 {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.6;
        }

        /* --- Buttons Styles --- */
        .btn-game-tf {
            font-size: 2.2rem;
            font-weight: 700;
            padding: 20px;
            border: 4px solid transparent;
            border-radius: 15px;
            transition: all 0.2s ease;
            color: #fff;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            width: 100%;
        }
        .btn-true-game { background-color: var(--true-green); }
        .btn-false-game { background-color: var(--false-red); }

        .btn-mcq-game {
            background: #fff;
            border: 3px solid var(--primary-navy);
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s ease;
            width: 100%;
            color: var(--primary-navy);
            box-shadow: 0 6px 0px var(--primary-navy);
        }

        /* Hover & Active */
        .btn-game-tf:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-mcq-game:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 0px var(--primary-navy); background-color: #f0f7ff; }
        
        .active-selection {
            transform: translateY(4px) !important;
            border-color: #000 !important;
        }
        .btn-game-tf.active-selection { box-shadow: 0 2px 0px rgba(0,0,0,0.2) !important; filter: brightness(0.9); }
        .btn-mcq-game.active-selection { background: var(--primary-navy) !important; color: #fff !important; box-shadow: 0 0 0px #000 !important; }

        /* Mascot & Controls */
        .mascot-aside { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .mascot-frame { width: 160px; height: 160px; background: #fff; border: 3px solid #000; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        
        /* กลุ่มปุ่มกด ย้อนกลับ และ ไปข้างหน้า */
        .action-buttons-group {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
        }

        .btn-action-game {
            color: #fff;
            border: 3px solid #000;
            border-radius: 50px;
            padding: 12px 0;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
            flex-grow: 1; 
            text-align: center;
        }

        .btn-next { background-color: var(--accent-orange); }
        .btn-back { background-color: var(--back-gray); }

        .btn-action-game:disabled { background: #d1d5db; border-color: #9ca3af; box-shadow: none; cursor: not-allowed; opacity: 0.7; color: #666; }
        .btn-action-game:hover:not(:disabled) { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; color: #fff; }

        .progress { background-color: rgba(255, 255, 255, 0.5); border-radius: 50px; border: 2px solid #000; overflow: hidden; }
        #mcq-grid .row { --bs-gutter-y: 1.5rem; }

        /* --- Review Section Styles --- */
        .review-card {
            background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 20px; margin-bottom: 20px; transition: 0.3s;
        }
        .review-card.correct { border-left: 8px solid var(--true-green); }
        .review-card.wrong { border-left: 8px solid var(--false-red); }
        .review-exp { background: #f8f9fa; border-left: 4px solid var(--primary-navy); padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.95rem; }

        /* =========================================
           RESPONSIVE (ปรับให้พอดีกับมือถือ)
           ========================================= */
        @media (max-width: 991px) {
            .quiz-article { margin-top: 100px; padding: 30px; }
            .question-wrapper { min-height: 200px; padding: 30px; }
            .mascot-aside { margin-top: 30px; }
        }

        @media (max-width: 768px) {
            .quiz-article { margin-top: 90px; padding: 20px; min-height: auto; }
            
            #idx-view { font-size: 1rem !important; padding: 8px 16px !important; }
            .progress { height: 10px !important; }
            .mx-4 { margin-left: 1rem !important; margin-right: 1rem !important; }

            .question-wrapper { min-height: 150px; padding: 20px; margin-bottom: 25px; }
            .question-wrapper h2 { font-size: 1.3rem; }

            .btn-game-tf { font-size: 1.5rem; padding: 15px; }
            .btn-mcq-game { font-size: 1rem; padding: 12px 15px; margin-bottom: 10px; }

            .mascot-frame { width: 120px; height: 120px; margin-bottom: 15px; }
            .btn-action-game { font-size: 1.2rem; padding: 10px 0; }
            
            .display-1 { font-size: 4rem; }
            .review-card { padding: 15px; }
            .review-card h5 { font-size: 1.1rem; }
            .review-exp { padding: 10px; font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            .question-wrapper h2 { font-size: 1.15rem; }
            .btn-game-tf { font-size: 1.3rem; padding: 12px; }
            .action-buttons-group { gap: 5px; }
        }
    </style>
</head>

<body>

    <header id="header" class="header d-flex align-items-center fixed-top shadow-sm">
        <div class="container-fluid container-xl d-flex align-items-center justify-content-between">
            <a href="index.html" class="logo d-flex align-items-center">
                <img src="assets/img/สกรีนช็อต 2026-01-30 203747-Photoroom.png" alt="โลโก้พยาบาลศาสตร์" style="max-height: 50px;">
            </a>
            <nav id="navmenu" class="navmenu">
                <ul class="d-flex list-unstyled m-0">
                    <li class="me-4"><a href="index.html" class="text-decoration-none">หน้าหลัก</a></li>
                    <li><a href="#" class="active text-decoration-none fw-bold">แบบทดสอบหลังเรียน</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="quiz-article shadow-lg" data-aos="zoom-in">

            <div id="quiz-flow">
                <div class="row">
                    <section class="col-lg-9">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="badge bg-dark fs-5 px-4 py-2 rounded-pill" id="idx-view">ข้อที่ 1 / 5</span>
                            <div class="progress flex-grow-1 mx-4" style="height: 15px;" role="progressbar">
                                <div id="bar-view" class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 20%"></div>
                            </div>
                        </div>

                        <div class="question-wrapper">
                            <h2 id="txt-view">เตรียมความพร้อม...</h2>
                        </div>

                        <div id="ui-area">
                            <div id="tf-grid" class="row g-4 mb-2">
                                <div class="col-6"><button type="button" class="btn btn-game-tf btn-true-game" id="tf-opt0" onclick="choose(0, this)">ถูก</button></div>
                                <div class="col-6"><button type="button" class="btn btn-game-tf btn-false-game" id="tf-opt1" onclick="choose(1, this)">ผิด</button></div>
                            </div>

                            <div id="mcq-grid" class="d-none mb-2">
                                <div class="row g-4">
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt0" onclick="choose(0, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt1" onclick="choose(1, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt2" onclick="choose(2, this)"></button></div>
                                    <div class="col-md-6"><button type="button" class="btn btn-mcq-game" id="opt3" onclick="choose(3, this)"></button></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <aside class="col-lg-3 mascot-aside">
                        <div class="mascot-frame">
                            <img src="assets/img/สีเหลืองใหญ่.png" alt="Mascot" class="img-fluid" id="mascot-img">
                        </div>
                        
                        <div class="action-buttons-group">
                            <button type="button" id="back-action" class="btn btn-action-game btn-back" onclick="stepBack()" disabled>
                                <i class="bi bi-caret-left-fill"></i> Back
                            </button>
                            <button type="button" id="next-action" class="btn btn-action-game btn-next" onclick="stepNext()" disabled>
                                Next <i class="bi bi-caret-right-fill"></i>
                            </button>
                        </div>
                    </aside>
                </div>
            </div>

            <div id="result-flow" class="d-none py-4 text-center">
                <div class="bg-white p-4 p-md-5 rounded-4 border border-4 mx-auto shadow" style="max-width: 800px; border-color: var(--primary-navy);">
                    <h2 class="fw-bold mb-4 fs-3">สรุปผลการทดสอบหลังเรียน</h2>
                    <div class="display-1 fw-bold text-success mb-2" id="score-view">0/5</div>
                    <p class="fs-5 text-muted mb-4" id="score-msg">ขอบคุณที่เข้าร่วมการทดสอบ</p>

                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mb-4">
                        <button class="btn btn-outline-primary btn-lg rounded-pill px-4 fw-bold" onclick="toggleReview()">
                            <i class="bi bi-card-checklist me-2"></i>ดูเฉลยและคำอธิบาย
                        </button>
                        <a href="index.html" class="btn btn-primary btn-lg rounded-pill px-4 fw-bold shadow">
                            กลับสู่หน้าหลัก
                        </a>
                    </div>

                    <div id="review-section" class="text-start d-none mt-4 border-top pt-4">
                        <h4 class="fw-bold mb-4 text-center"><i class="bi bi-journal-text text-warning me-2"></i>เฉลยแบบทดสอบ</h4>
                        <div id="review-container">
                            </div>
                    </div>
                </div>
            </div>

        </article>
    </main>

    <footer class="text-center py-4">
        <p class="text-muted small m-0">© 2026 SMART Nurse - คณะพยาบาลศาสตร์ มหาวิทยาลัยขอนแก่น</p>
    </footer>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/aos/aos.js"></script>

    <script>
        // ข้อมูลชุดคำถามและเฉลย
        const quizData = [
            { 
                "q": "1. แบบประเมิน BADL คือแบบประเมินความสามารถในการทำกิจวัตรประจำวันพื้นฐาน", 
                "type": "tf", "opts": ["ถูก", "ผิด"], "ans": 0,
                "exp": "BADL เป็นการประเมินความสามารถในการทำกิจวัตรประจำวันพื้นฐาน เช่น การกินอาหาร การอาบน้ำ หรือแต่งตัวเป็นต้น"
            },
            { 
                "q": "2. แบบประเมิน IADL คือแบบประเมินความสามารถในการทำกิจวัตรประจำวันพื้นฐาน", 
                "type": "tf", "opts": ["ถูก", "ผิด"], "ans": 1,
                "exp": "ผิด เพราะ IADL เป็นการประเมินความสามารถในการทำกิจวัตรประจำวันต่อเนื่อง/ต้องใช้อุปกรณ์ เช่น การทำความสะอาดบ้าน การปรุงอาหาร หรือการซักรีดเสื้อผ้า เป็นต้น"
            },
            { 
                "q": "3. กิจกรรมใดต่อไปนี้เป็นการประเมิน BADL", 
                "type": "mcq", "opts": ["การขึ้นลงบันได 1 ชั้น", "การหุงหา/อุ่นอาหาร", "การทำความสะอาดบ้าน", "การใช้โทรศัพท์"], "ans": 0,
                "exp": "การขึ้นลงบันได 1 ชั้น เป็นกิจกรรมของ BADL ส่วนข้ออื่น ๆ เป็นกิจกรรมของ IADL"
            },
            { 
                "q": "4. กิจกรรมใดต่อไปนี้เป็นการประเมิน IADL", 
                "type": "mcq", "opts": ["การใช้ห้องน้ำ", "การรับประทานอาหารเมื่อเตรียมสำรับไว้ให้เรียบร้อยต่อหน้า", "การหุงหา/อุ่นอาหาร", "การสวมใส่เสื้อผ้า"], "ans": 2,
                "exp": "การหุงหา/อุ่นอาหาร เป็นกิจกรรมของ IADL ส่วนข้ออื่นเป็นกิจกรรมของ BADL"
            },
            { 
                "q": "5. บุคคลกลุ่มใดเหมาะสมในการใช้แบบประเมิน BADL & IADL มากที่สุด", 
                "type": "mcq", "opts": ["ผู้ที่มีความวิตกกังวลสูง", "ผู้ที่มีปัญหาการสื่อสารอย่างเดียว", "ผู้ที่มีภาวะซึมเศร้า", "ผู้สูงอายุ/ผู้ป่วยที่มีข้อจำกัดในการช่วยเหลือตัวเอง"], "ans": 3,
                "exp": "แบบประเมิน BADL & IADL มีวัตถุประสงค์หลักเพื่อประเมินระดับการพึ่งพิงของผู้สูงอายุ หรือผู้ป่วยที่มีข้อจำกัดในการช่วยเหลือตัวเองเป็นหลัก"
            }
        ];

        let curIdx = 0;
        let curPicked = null;
        let userAnswers = new Array(quizData.length).fill(null); // เก็บคำตอบไว้ทบทวนและดูเฉลย
        let timeoutId = null;

        function render() {
            const data = quizData[curIdx];
            
            // ตั้งค่าปุ่ม กลับ 
            document.getElementById('back-action').disabled = (curIdx === 0);
            
            // ตั้งค่าปุ่ม ถัดไป
            const nextBtn = document.getElementById('next-action');
            nextBtn.disabled = (userAnswers[curIdx] === null);
            
            if (curIdx === quizData.length - 1) {
                nextBtn.innerHTML = 'ดูผล <i class="bi bi-check-circle-fill"></i>';
            } else {
                nextBtn.innerHTML = 'ต่อไป <i class="bi bi-caret-right-fill"></i>';
            }
            
            document.getElementById('idx-view').innerText = `ข้อที่ ${curIdx + 1} / ${quizData.length}`;
            document.getElementById('txt-view').innerText = data.q;
            document.getElementById('bar-view').style.width = `${((curIdx + 1) / quizData.length) * 100}%`;

            // รีเซ็ตปุ่ม
            document.querySelectorAll('.btn-game-tf, .btn-mcq-game').forEach(b => {
                b.classList.remove('active-selection');
            });

            if (data.type === 'tf') {
                document.getElementById('tf-grid').classList.remove('d-none');
                document.getElementById('mcq-grid').classList.add('d-none');
                
                // ถ้าเคยตอบข้อนี้แล้ว ให้แสดงสถานะเดิม
                if(userAnswers[curIdx] !== null) {
                    document.getElementById(`tf-opt${userAnswers[curIdx]}`).classList.add('active-selection');
                }
            } else {
                document.getElementById('tf-grid').classList.add('d-none');
                document.getElementById('mcq-grid').classList.remove('d-none');
                data.opts.forEach((v, i) => {
                    let btn = document.getElementById(`opt${i}`);
                    btn.innerText = v;
                    
                    // ถ้าเคยตอบข้อนี้แล้ว ให้แสดงสถานะเดิม
                    if(userAnswers[curIdx] === i) {
                        btn.classList.add('active-selection');
                    }
                });
            }
        }

        function choose(val, btn) {
            // เคลียร์การทำงานล่วงหน้าหากผู้ใช้กดรัวๆ
            if(timeoutId) clearTimeout(timeoutId);

            curPicked = val;
            userAnswers[curIdx] = val;
            
            const parent = btn.closest('.row');
            parent.querySelectorAll('button').forEach(b => b.classList.remove('active-selection'));
            btn.classList.add('active-selection');
            document.getElementById('next-action').disabled = false;

            // หน่วงเวลา 0.5 วิ แล้วเลื่อนไปข้อถัดไป
            timeoutId = setTimeout(() => {
                stepNext();
            }, 500);
        }

        function stepNext() {
            if(timeoutId) clearTimeout(timeoutId); 
            
            curIdx++;
            if (curIdx < quizData.length) {
                render();
            } else {
                showResult();
            }
        }

        function stepBack() {
            if(timeoutId) clearTimeout(timeoutId);
            
            if(curIdx > 0) {
                curIdx--;
                render();
            }
        }

        function showResult() {
            // คำนวณคะแนนตอนสุดท้าย (เพื่อรองรับการย้อนกลับไปเปลี่ยนคำตอบ)
            let totalScore = 0;
            for(let i = 0; i < quizData.length; i++) {
                if(userAnswers[i] === quizData[i].ans) {
                    totalScore++;
                }
            }

            document.getElementById('quiz-flow').classList.add('d-none');
            document.getElementById('result-flow').classList.remove('d-none');
            document.getElementById('score-view').innerText = `${totalScore}/${quizData.length}`;
            
            const msg = document.getElementById('score-msg');
            const scoreView = document.getElementById('score-view');
            
            // รีเซ็ตคลาสสีก่อน
            scoreView.classList.remove('text-success', 'text-warning');

            if(totalScore >= 4) {
                msg.innerHTML = "สุดยอดไปเลย! <br>คุณมีความเข้าใจเกี่ยวกับการประเมินเป็นอย่างดี";
                scoreView.classList.add('text-success');
            } else {
                msg.innerHTML = "ไม่เป็นไร! <br>ลองดูเฉลยด้านล่างเพื่อทบทวนความเข้าใจอีกครั้งนะ";
                scoreView.classList.add('text-warning');
            }

            buildReview();
        }

        // ฟังก์ชันสร้างหน้าต่างเฉลยอัตโนมัติ
        function buildReview() {
            const container = document.getElementById('review-container');
            let html = "";

            quizData.forEach((data, index) => {
                const userAns = userAnswers[index];
                const isCorrect = (userAns === data.ans);
                const statusClass = isCorrect ? "correct" : "wrong";
                const icon = isCorrect ? '<i class="bi bi-check-circle-fill text-success"></i> ถูกต้อง' : '<i class="bi bi-x-circle-fill text-danger"></i> ผิด';
                
                // กันกรณีที่ผู้ใช้อาจจะข้ามโดยไม่ได้ตอบ (ถ้ามี)
                const userText = (userAns !== null && data.opts[userAns]) ? data.opts[userAns] : "ไม่ได้ตอบ";

                html += `
                    <div class="review-card shadow-sm ${statusClass}">
                        <h5 class="fw-bold mb-3">${data.q}</h5>
                        <p class="mb-1"><strong>คำตอบของคุณ:</strong> <span class="${isCorrect ? 'text-success fw-bold' : 'text-danger text-decoration-line-through'}">${userText}</span></p>
                        ${!isCorrect ? `<p class="mb-1"><strong>คำตอบที่ถูกต้อง:</strong> <span class="text-success fw-bold">${data.opts[data.ans]}</span></p>` : ''}
                        <p class="mb-0 mt-2">${icon}</p>
                        
                        <div class="review-exp shadow-sm">
                            <strong class="text-primary"><i class="bi bi-lightbulb-fill text-warning me-1"></i> คำอธิบาย:</strong><br>
                            ${data.exp}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // สลับเปิด/ปิด หน้าต่างเฉลย
        function toggleReview() {
            const reviewSec = document.getElementById('review-section');
            if (reviewSec.classList.contains('d-none')) {
                reviewSec.classList.remove('d-none');
                reviewSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                reviewSec.classList.add('d-none');
            }
        }

        // Auto-hide Navbar logic
        const header = document.getElementById('header');
        window.onscroll = () => {
            if (window.scrollY > 80) header.classList.add('header-hidden');
            else header.classList.remove('header-hidden');
        };
        document.onmousemove = (e) => { if (e.clientY < 60) header.classList.remove('header-hidden'); };

        document.addEventListener('DOMContentLoaded', () => { AOS.init(); render(); });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับผิด</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&family=Sarabun:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5B2FBE;
            --secondary: #F7A831;
            --accent: #E8425A;
            --teal: #2BBFB0;
            --sidebar-w: 220px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse 80% 60% at 10% 0%, #FFE68D 0%, transparent 80%),
                radial-gradient(ellipse 60% 50% at 95% 5%, #ffcce0 0%, transparent 55%),
                radial-gradient(ellipse 50% 60% at 80% 90%, #b6f0ea 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 20% 95%, #ffe0a8 0%, transparent 55%),
                #f3eeff;
            overflow-x: hidden;
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 340px;
            height: 340px;
            background: rgba(108, 63, 197, 0.08);
            top: -100px;
            right: 80px;
            animation: drift 12s ease-in-out infinite;
        }

        .bg-shape-2 {
            width: 220px;
            height: 220px;
            background: rgba(247, 168, 49, 0.10);
            bottom: -60px;
            left: 260px;
            animation: drift 16s ease-in-out infinite reverse;
        }

        .bg-shape-3 {
            width: 160px;
            height: 160px;
            background: rgba(43, 191, 176, 0.10);
            top: 45%;
            right: 8%;
            animation: drift 10s ease-in-out infinite 2s;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(18px, -22px) scale(1.06);
            }
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            animation: fadeUp 0.65s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            padding: 36px 16px 36px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(18px);
            border-right: 1.5px solid rgba(255, 255, 255, 0.60);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-label {
            font-size: 10px;
            color: var(--primary);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 14px;
            opacity: 0.55;
            padding-left: 6px;
            font-family: 'Kanit', sans-serif;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 14px;
            color: #4a3880;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .22s ease;
            text-decoration: none;
            font-family: 'Kanit', sans-serif;
        }

        .nav-item:hover {
            background: rgba(91, 47, 190, 0.09);
            color: var(--primary);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(130deg, var(--secondary) 0%, #f08c1a 100%);
            color: #3a1f00;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(247, 168, 49, 0.38);
        }

        .nav-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 42px 52px 36px 52px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page-title {
            font-size: 38px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 36px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 64px;
            height: 5px;
            border-radius: 5px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
        }

        /* GAME BOX */
        .game-box {
            flex: 1;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(18px);
            border: 2px solid rgba(255, 255, 255, 0.80);
            box-shadow: 0 8px 40px rgba(91, 47, 190, 0.10), 0 2px 0 rgba(255, 255, 255, 0.9) inset;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .game-box:hover {
            box-shadow: 0 18px 56px rgba(91, 47, 190, 0.16), 0 2px 0 rgba(255, 255, 255, 0.9) inset;
            transform: translateY(-3px);
        }

        .game-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 56px;
            height: 56px;
            border-top: 3px solid rgba(91, 47, 190, 0.3);
            border-left: 3px solid rgba(91, 47, 190, 0.3);
            border-radius: 24px 0 0 0;
        }

        .game-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 56px;
            height: 56px;
            border-bottom: 3px solid rgba(43, 191, 176, 0.4);
            border-right: 3px solid rgba(43, 191, 176, 0.4);
            border-radius: 0 0 24px 0;
        }

        .box-content {
            text-align: center;
            z-index: 1;
        }

        .link-icon {
            font-size: 52px;
            display: block;
            margin-bottom: 14px;
            animation: float 3.2s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .box-label {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .box-sub {
            font-size: 14px;
            color: rgba(91, 47, 190, 0.45);
            margin-top: 6px;
            font-family: 'Sarabun', sans-serif;
        }

        /* BOTTOM */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 30px;
            gap: 18px;
        }

        .mascot {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.75);
            border-radius: 50px;
            padding: 8px 18px;
        }

        .mascot-emoji {
            font-size: 34px;
            line-height: 1;
        }

        .next-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #9067f5 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 14px 38px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(91, 47, 190, 0.38);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 36px rgba(91, 47, 190, 0.48);
        }

        .next-btn:active {
            transform: translateY(0);
        }

        .arrow {
            font-size: 18px;
            transition: transform 0.22s ease;
            display: inline-block;
        }

        .next-btn:hover .arrow {
            transform: translateX(5px);
        }

        /* DOTS */
        .dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .d1 {
            width: 12px;
            height: 12px;
            background: var(--secondary);
            top: 18%;
            right: 22%;
            opacity: .35;
            animation: pop 5s ease-in-out infinite;
        }

        .d2 {
            width: 7px;
            height: 7px;
            background: var(--accent);
            top: 28%;
            right: 18%;
            opacity: .28;
            animation: pop 4s ease-in-out infinite 1.2s;
        }

        .d3 {
            width: 16px;
            height: 16px;
            background: var(--teal);
            bottom: 24%;
            left: 34%;
            opacity: .30;
            animation: pop 6s ease-in-out infinite 0.7s;
        }

        .d4 {
            width: 9px;
            height: 9px;
            background: var(--primary);
            bottom: 18%;
            left: 44%;
            opacity: .22;
            animation: pop 4.5s ease-in-out infinite 2s;
        }

        @keyframes pop {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.28;
            }

            50% {
                transform: scale(1.6);
                opacity: 0.48;
            }
        }

        /* ===== Tablet ===== */
        @media (max-width: 1024px) {

            .page {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                flex-direction: row;
                justify-content: space-around;
                padding: 14px;
                gap: 6px;
            }

            .sidebar-label {
                display: none;
            }

            .nav-item {
                font-size: 13px;
                padding: 9px 12px;
            }

            .main {
                padding: 30px 24px;
            }

            .page-title {
                font-size: 30px;
            }

            .game-box {
                min-height: 220px;
            }

        }

        /* ===== Mobile ===== */
        @media (max-width: 600px) {

            .main {
                padding: 24px 16px;
            }

            .page-title {
                font-size: 24px;
            }

            .box-label {
                font-size: 22px;
            }

            .box-sub {
                font-size: 13px;
            }

            .link-icon {
                font-size: 40px;
            }

            .sidebar {
                flex-wrap: wrap;
                gap: 6px;
            }

            .nav-item {
                font-size: 13px;
                padding: 8px 10px;
            }

            .next-btn {
                padding: 12px 26px;
                font-size: 14px;
            }

            .mascot-emoji {
                font-size: 26px;
            }

        }
    </style>
</head>

<body>

    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>

    <div class="page">

        <aside class="sidebar">
            <div class="sidebar-label">แถบเมนู</div>
            <a class="nav-item" href="main_page.html"><span class="nav-icon">🏠</span> Home</a>
            <a class="nav-item" href="pretest_mmse.html"><span class="nav-icon">📋</span> Pretest</a>
            <a class="nav-item active" href="mmse_game.html"><span class="nav-icon">🎯</span> เกมจับผิด</a>
            <a class="nav-item" href="mmse_intepretation.html"><span class="nav-icon">🔄</span> เกมแปลผล</a>
            <a class="nav-item" href="#"><span class="nav-icon">📝</span> Post-test</a>
        </aside>

        <main class="main">
            <h1 class="page-title">🎯 เกมจับผิด</h1>

            <div class="game-box">
                <iframe
                    src="https://wordwall.net/embed/0e46f41875c944a0b9b315d1bfe75aa3?themeId=41&templateId=5&fontStackId=0"
                    width="100%" height="500" frameborder="0" allowfullscreen>
                </iframe>
            </div>

            <div class="bottom-bar">
                <div class="mascot">
                    <span class="mascot-emoji">👴</span>
                    <span class="mascot-emoji">👵</span>
                </div>
                <button class="next-btn">NEXT <span class="arrow">→</span></button>
            </div>
        </main>

    </div>
</body>

</html>

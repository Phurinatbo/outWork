<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game BADL - SMART Nurse</title>

        <link href="assets/img/พยาบาลศาสตร์.png" rel="icon">
        <link href="assets/img/พยาบาลศาสตร์.png" rel="apple-touch-icon">

        <link
            href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap"
            rel="stylesheet">
        <link href="assets/vendor/bootstrap/css/bootstrap.min.css"
            rel="stylesheet">
        <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css"
            rel="stylesheet">

        <style>
        :root {
            --bg-yellow: #FFFAE4;
            --btn-orange: #F37321;
            --line-red: #A64444;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-yellow); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            margin: 0; 
            padding: 20px 0; 
        }

        .game-layout { 
            border: 4px solid #000; 
            background-color: var(--bg-yellow); 
            padding: 50px; 
            min-height: 85vh; 
            width: 100%; 
            border-radius: 15px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-subtitle { 
            font-size: 1.3rem; 
            font-weight: 500; 
            margin-bottom: 1rem;
        }
        
        /* เปลี่ยนสไตล์สำหรับ Button ให้ดูเหมือนตัวหนังสือปกติ */
        .game-main-title { 
            background: transparent;
            border: none;
            padding: 0;
            font-family: inherit;
            font-size: 8.5rem; 
            font-weight: 900; 
            line-height: 0.9; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            word-wrap: break-word; 
            display: inline-block; 
            color: #1a202c;
            text-align: left;
        }
        
        .game-main-title:hover, .game-main-title:focus { 
            color: var(--btn-orange); 
            transform: scale(1.05) translateY(-5px); 
            text-shadow: 4px 4px 0px #000;
            outline: none; /* เอา Outline อัตโนมัติออกเมื่อใช้ Focus ด้วยเงาแล้ว */
        }

        /* อนิเมชั่นชี้เป้าหมายให้กด */
        .click-hint {
            color: var(--btn-orange);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* วงกลม 3 วงด้านล่าง */
        .steps-container { display: flex; align-items: center; margin-top: 40px; flex-wrap: nowrap; }
        .step-circle { 
            width: 140px; height: 140px; 
            background-color: #fff; border: 3px solid #000; border-radius: 50%; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        .step-circle img { width: 100%; height: 100%; object-fit: cover;  }
        .step-line { width: 120px; height: 6px; background-color: var(--line-red); margin: 0 -5px; flex-shrink: 1; min-width: 20px; }

        .big-circle-container { display: flex; justify-content: center; align-items: center; height: 100%; margin-top: 20px; }
        .big-circle { width: 380px; height: 380px; background-color: #FCE686; border-radius: 50%; border: 3px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .btn-next-step { 
            background-color: var(--btn-orange); color: #fff; border: 3px solid #000; border-radius: 50px; 
            padding: 12px 70px; font-size: 2.2rem; font-weight: 900; box-shadow: 6px 6px 0px #000; transition: 0.2s; 
            align-self: flex-end; margin-top: 40px; 
        }
        .btn-next-step:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; opacity: 0.5; }

        /* Modal Styles */
        .modal-content { border: 6px solid #000; border-radius: 25px; overflow: hidden; }
        .modal-header { background-color: #FFC107; border-bottom: 4px solid #000; }
        #close-game-btn { display: none; }
        .verify-box { background: #fff3cd; border: 2px dashed #856404; padding: 15px; border-radius: 10px; margin-top: 10px; }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 991px) {
            .game-main-title { font-size: 5rem; }
            .big-circle { width: 300px; height: 300px; }
            .step-circle { width: 100px; height: 100px; border-width: 1px; }
            .step-line { width: 80px; }
            .game-layout { padding: 30px; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .game-layout { padding: 20px; }
            .game-subtitle { font-size: 1.1rem; text-align: center; }
            
            .title-wrapper { text-align: center; }
            .game-main-title { font-size: 4rem; text-align: center; }
            
            .steps-container { margin-top: 30px; justify-content: center; }
            .step-circle { width: 75px; height: 75px; border-width: 1px; }
            .step-line { width: 40px; height: 4px; }
            
            .big-circle-container { margin-top: 40px; }
            .big-circle { width: 220px; height: 220px; }
            
            .btn-next-step { width: 100%; text-align: center; align-self: center; font-size: 1.5rem; padding: 15px 0; margin-top: 30px; }
            
            .modal-title { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .game-main-title { font-size: 3.2rem; }
            .step-circle { width: 60px; height: 60px; }
            .step-line { width: 25px; }
            .big-circle { width: 180px; height: 180px; }
        }
        </style>
    </head>
    <body>

        <main class="container">
            <article class="game-layout shadow-lg">
                <div class="row align-items-center">

                    <div class="col-lg-7">
                        <h1
                            class="game-subtitle">การประเมินสมรรถภาพทางสมอง (MMSE-Thai 2002)</h1>

                        <div class="title-wrapper">
                            <p class="click-hint" aria-hidden="true"><i
                                    class="bi bi-arrow-down-right-square-fill"></i>
                                คลิกข้อความด้านล่างเพื่อเริ่มเล่นเกม</p>

                            <button type="button" class="game-main-title"
                                onclick="openGame()"
                                aria-label="เริ่มเล่นเกม BADL">
                                Games<br>MMSE
                            </button>
                        </div>

                        <div class="steps-container">
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/1. อุปกรณ์ล้างหน้า.jpg"
                                    alt="อุปกรณ์ล้างหน้า">
                            </div>
                            <div class="step-line" aria-hidden="true"></div>
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/2. walker.jpg"
                                    alt="อุปกรณ์ช่วยเดิน">
                            </div>
                            <div class="step-line" aria-hidden="true"></div>
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/3. เซ็ตเสื้อผ้า.jpg"
                                    alt="เซ็ตเสื้อผ้าสำหรับเปลี่ยน">
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="big-circle-container">
                            <div class="big-circle shadow-lg">
                                <img src="assets\img\ไอคอน MMSE .PNG"
                                    alt="พยาบาล Mascot" style="max-width: 80%;">
                            </div>
                        </div>
                    </div>

                </div>

                <button type="button" id="btn-next" class="btn btn-next-step"
                    onclick="location.href='mmse_intepretation.html'"
                    disabled>Next</button>
            </article>
        </main>

        <div class="modal fade" id="gameModal" data-bs-backdrop="static"
            data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalTitle"
            aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 id="modalTitle" class="modal-title fw-bold">🎮
                            กิจกรรม Games MMSE (ต้องเล่นให้จบเพื่อปลดล็อก)</h4>
                        <button type="button" id="close-game-btn"
                            class="btn-close" aria-label="ปิดหน้าต่าง"
                            onclick="finishGame()"></button>
                    </div>
                    <div class="modal-body p-0 text-center">

                        <iframe id="game-frame"
                            title="เกมประเมิน BADL จาก Wordwall"
                            style="width: 100%; height: 600px; border: none;"
                            src="https://wordwall.net/embed/0e46f41875c944a0b9b315d1bfe75aa3?themeId=41&templateId=5&fontStackId=0"
                            allowfullscreen
                            sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                            referrerpolicy="strict-origin-when-cross-origin"
                            loading="lazy">
                        </iframe>

                        <div
                            class="p-3 bg-light border-top border-4 border-dark">

                            <div
                                class="alert alert-warning mb-3 py-2 text-start d-flex align-items-center justify-content-between"
                                role="alert">
                                <small class="mb-0 fw-bold"><i
                                        class="bi bi-info-circle-fill me-1"></i>
                                    หากเกมไม่แสดงผล / โหลดไม่ขึ้น</small>

                                <button type="button"
                                    onclick="location.reload();"
                                    class="btn btn-sm btn-dark fw-bold rounded-pill px-3">
                                    <i class="bi bi-arrow-clockwise me-1"></i>
                                    โหลดหน้าเว็บใหม่
                                </button>
                            </div>

                            <div
                                class="verify-box d-inline-block text-start mb-2 w-100">
                                <p class="mb-2 fw-bold text-danger"><i
                                        class="bi bi-exclamation-triangle-fill"></i>
                                    ยืนยันสถานะการเล่น:</p>
                                <div class="form-check">
                                    <input class="form-check-input border-dark"
                                        type="checkbox" id="check-played"
                                        onchange="checkStatus()">
                                    <label class="form-check-label"
                                        for="check-played">ฉันได้เล่นเกมจนจบและทราบผลคะแนนแล้ว</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input border-dark"
                                        type="checkbox" id="check-done"
                                        onchange="checkStatus()">
                                    <label class="form-check-label"
                                        for="check-done">ฉันพร้อมที่จะทำแบบทดสอบหลังเรียน
                                        (Post-test)</label>
                                </div>
                            </div>

                            <div id="unlock-msg"
                                class="mt-2 fw-bold text-secondary"
                                aria-live="polite">กรุณาเล่นเกมและติ๊กยืนยันทั้ง
                                2 ข้อเพื่อปิดหน้าต่างนี้</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script
            src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <script>
        let gameModal = new bootstrap.Modal(document.getElementById('gameModal'));

        function openGame() {
            document.getElementById('check-played').checked = false;
            document.getElementById('check-done').checked = false;
            document.getElementById('close-game-btn').style.display = 'none';
            gameModal.show();
        }

        function checkStatus() {
            const p1 = document.getElementById('check-played').checked;
            const p2 = document.getElementById('check-done').checked;
            const closeBtn = document.getElementById('close-game-btn');
            const msg = document.getElementById('unlock-msg');

            if (p1 && p2) {
                closeBtn.style.display = 'block'; 
                msg.innerHTML = "<span class='text-success'>✅ ปลดล็อกแล้ว! กดปุ่ม X มุมขวาบนเพื่อดำเนินการต่อ</span>";
            } else {
                closeBtn.style.display = 'none';
                msg.innerHTML = "กรุณาเล่นเกมและติ๊กยืนยันเพื่อปิดหน้าต่างนี้";
            }
        }

        function finishGame() {
            document.getElementById('btn-next').disabled = false;
            gameModal.hide();
        }

        window.onbeforeunload = function() {
            if (document.getElementById('gameModal').classList.contains('show')) {
                return "คุณยังทำกิจกรรมไม่เสร็จสิ้น!";
            }
        };
        </script>
    </body>
</html>

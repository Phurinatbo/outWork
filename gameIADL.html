<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game ADL - SMART Nurse</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap"
            rel="stylesheet">
        <link href="assets/vendor/bootstrap/css/bootstrap.min.css"
            rel="stylesheet">
        <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css"
            rel="stylesheet">

        <style>
        :root {
            --bg-yellow: #FFFAE4;
            --btn-orange: #F37321;
            --line-red: #A64444;
        }

        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-yellow); height: 100vh; display: flex; align-items: center; margin: 0; }

        .game-layout { border: 4px solid #000; background-color: var(--bg-yellow); padding: 50px; min-height: 85vh; position: relative; width: 100%; border-radius: 15px; }

        .game-subtitle { font-size: 1.3rem; font-weight: 500; }
        .game-main-title { font-size: 8.5rem; font-weight: 900; line-height: 0.9; cursor: pointer; transition: 0.3s; }
        .game-main-title:hover { color: var(--btn-orange); transform: scale(1.02); }

        /* วงกลม 3 วงด้านล่าง */
        .steps-container { display: flex; align-items: center; margin-top: 60px; }
        .step-circle { width: 140px; height: 140px; background-color: #fff; border: 4px solid #000; border-radius: 50%; }
        .step-line { width: 120px; height: 6px; background-color: var(--line-red); margin: 0 -5px; }

        .big-circle { width: 380px; height: 380px; background-color: #FCE686; border-radius: 50%; position: absolute; right: 8%; top: 10%; border: 3px solid #000; display: flex; align-items: center; justify-content: center; }

        .btn-next-step { background-color: var(--btn-orange); color: #fff; border: 3px solid #000; border-radius: 50px; padding: 12px 70px; font-size: 2.2rem; font-weight: 900; position: absolute; right: 5%; bottom: 5%; box-shadow: 6px 6px 0px #000; transition: 0.2s; }
        .btn-next-step:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; opacity: 0.5; }

        /* Modal Styles */
        .modal-content { border: 6px solid #000; border-radius: 25px; overflow: hidden; }
        .modal-header { background-color: #FFC107; border-bottom: 4px solid #000; }
        
        /* ซ่อนปุ่มปิดจริงไว้จนกว่าจะผ่านเงื่อนไข */
        #close-game-btn { display: none; }
        
        .verify-box { background: #fff3cd; border: 2px dashed #856404; padding: 15px; border-radius: 10px; margin-top: 10px; }

        .step-circle { 
    width: 140px; 
    height: 140px; 
    background-color: #fff; 
    border: 4px solid #000; 
    border-radius: 50%; 
    overflow: hidden; /* คำสั่งนี้สำคัญมาก! จะตัดขอบรูปภาพที่ล้นให้เป็นวงกลม */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ตั้งค่าให้รูปภาพขยายเต็มวงกลมและไม่เสียสัดส่วน */
.step-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* ทำให้รูปภาพซูมพอดีกับกรอบวงกลม */
}
    </style>
    </head>
    <body>

        <main class="container">
            <article class="game-layout shadow-lg">
                <div class="row">
                    <div class="col-lg-7">
                        <p
                            class="game-subtitle">แบบประเมินความสามารถเชิงปฏิบัติในการ<br>ทำกิจวัตรประจำวันพื้นฐาน</p>
                        <h1 class="game-main-title"
                            onclick="openGame()">Games<br>IADL</h1>

                        <div class="steps-container">
                            <div class="step-circle shadow-sm">
                                <img src="assets/img/1. เงิน.jpg"
                                    alt="Step 1">
                            </div>

                            <div class="step-line"></div>

                            <div class="step-circle shadow-sm">
                                <img src="assets/img/2. ไม้กวาด.jpg" alt="Step 2">
                            </div>

                            <div class="step-line"></div>

                            <div class="step-circle shadow-sm">
                                <img src="assets/img/3. รถ.jpg" alt="Step 3">
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="big-circle shadow-lg">
                            <img src="assets/img/สีเหลืองใหญ่.png" alt="Nurse"
                                style="max-width: 80%;">
                        </div>
                    </div>
                </div>
                <button id="btn-next" class="btn btn-next-step"
                    onclick="location.href='post-test.html'"
                    disabled>Next</button>
            </article>
        </main>

        <div class="modal fade" id="gameModal" data-bs-backdrop="static"
            data-bs-keyboard="false" tabindex="-1">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title fw-bold">🎮 กิจกรรม Games IADL
                            (ต้องเล่นให้จบเพื่อปลดล็อก)</h4>
                        <button type="button" id="close-game-btn"
                            class="btn-close" onclick="finishGame()"></button>
                    </div>
                    <div class="modal-body p-0 text-center">
                        <iframe id="game-frame"
                            style="width:100%; height: 600px;" src
                            frameborder="0" allowfullscreen></iframe>

                        <div
                            class="p-3 bg-light border-top border-4 border-dark">
                            <div class="verify-box d-inline-block text-start">
                                <p class="mb-2 fw-bold text-danger"><i
                                        class="bi bi-exclamation-triangle-fill"></i>
                                    ยืนยันสถานะการเล่น:</p>
                                <div class="form-check">
                                    <input class="form-check-input border-dark"
                                        type="checkbox" id="check-played"
                                        onchange="checkStatus()">
                                    <label class="form-check-label"
                                        for="check-played">ฉันได้เล่นเกมจนจบและทราบผลคะแนนแล้ว</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input border-dark"
                                        type="checkbox" id="check-done"
                                        onchange="checkStatus()">
                                    <label class="form-check-label"
                                        for="check-done">ฉันพร้อมที่จะทำแบบทดสอบหลังเรียน
                                        (Post-test)</label>
                                </div>
                            </div>
                            <div id="unlock-msg"
                                class="mt-2 fw-bold text-secondary">กรุณาเล่นเกมและติ๊กยืนยันเพื่อปิดหน้าต่างนี้</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script
            src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

        <script>
    let gameModal = new bootstrap.Modal(document.getElementById('gameModal'));

    function openGame() {
        document.getElementById('game-frame').src = "https://wordwall.net/embed/f1bdcd29b8a04d87a021b733a22453c7?themeId=65&templateId=5&fontStackId=0";
        // รีเซ็ต checkbox ทุกครั้งที่เปิด
        document.getElementById('check-played').checked = false;
        document.getElementById('check-done').checked = false;
        document.getElementById('close-game-btn').style.display = 'none';
        gameModal.show();
    }

    function checkStatus() {
        const p1 = document.getElementById('check-played').checked;
        const p2 = document.getElementById('check-done').checked;
        const closeBtn = document.getElementById('close-game-btn');
        const msg = document.getElementById('unlock-msg');

        if (p1 && p2) {
            closeBtn.style.display = 'block'; // แสดงปุ่ม X ให้ปิดได้
            msg.innerHTML = "<span class='text-success'>✅ ปลดล็อกแล้ว! กดปุ่ม X มุมขวาบนเพื่อดำเนินการต่อ</span>";
        } else {
            closeBtn.style.display = 'none';
            msg.innerHTML = "กรุณาเล่นเกมและติ๊กยืนยันเพื่อปิดหน้าต่างนี้";
        }
    }

    function finishGame() {
        document.getElementById('btn-next').disabled = false;
        gameModal.hide();
    }

    // ป้องกันการเผลอกดออก
    window.onbeforeunload = function() {
        if (document.getElementById('gameModal').classList.contains('show')) {
            return "คุณยังทำกิจกรรมไม่เสร็จสิ้น!";
        }
    };
</script>

    </body>
</html>
